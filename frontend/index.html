<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#165dff" />
    <meta name="description" content="PortPass — 按需临时开放服务器端口的自助管理工具" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>PortPass · 临时端口开放</title>
    <script>
      // Anti-flash: apply the persisted colour scheme before Vue mounts so
      // the first paint matches the user's preference. `dark` class on the
      // root element is consumed by Tailwind's @custom-variant dark hook.
      (function () {
        try {
          var v = localStorage.getItem('portpass.theme');
          var dark = v === 'dark' || (v !== 'light' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.background = '#0f1216';
          } else {
            document.documentElement.style.background = '#f6f8fb';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
