name: 功能建议
description: 提出新功能或改进想法
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你遇到了什么问题、想达到什么目标？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 期望的实现方式（可选）
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否考虑过其他方式？为什么不行？
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: 影响面（多选）
      options:
        - label: 前端 UI / 交互
        - label: 后端 API
        - label: 防火墙驱动 / 规则引擎
        - label: 鉴权 / 用户体系
        - label: 部署 / 文档
